<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="styles.css">
  <link 
  rel="preload" 
  href="/fonts/inter-v20-latin-700.woff2"
  as="font"
  type="font/woff2"
  crossorigin>
  <link 
  rel="preload" 
  href="/fonts/inter-v20-latin-regular.woff2"
  as="font"
  type="font/woff2"
  crossorigin>
    <link 
  rel="preload" 
  href="/fonts/lexend-deca-v25-latin-regular.woff2"
  as="font"
  type="font/woff2"
  crossorigin>
  <title>Frontend Mentor | Stats preview card component</title>
</head>
<body>
    <main class="parent-container">
      <article class="card-holder">
        <div class="image-container">
        </div>

        <section class="content-container">
          <div class="title-paragraph-container">
              <h1 class="title">Get <span class="coloured-text">insights</span> that help your business grow.</h1>
              <p class="paragraph">
                Discover the benefits of data analytics and make better decisions regarding revenue, customer 
                experience, and overall efficiency.
              </p>
          </div>

          <div class="stats-container">
            <div class="stat1">
              <h2 class="metric">10k+</h2> <p class="stats-text">COMPANIES</p>
            </div>
            <div class="stat2">
              <h2 class="metric">314</h2> <p class="stats-text">TEMPLATES</p>
            </div>
            <div class="stat3">
              <h2 class="metric">12M+</h2> <p class="stats-text">QUERIES</p>
            </div>
          </div>
        </section>
      </article>
    </main>
</body>
</html>
